<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Core Portal Access - ComfortXpress</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #163961;
            --accent-orange: #F5821F;
            --dark-slate: #0b1d32;
            --white: #ffffff;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 0;
            background: linear-gradient(135deg, var(--dark-slate) 0%, #11253e 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }

        .auth-card {
            background: var(--white); width: 100%; max-width: 420px;
            padding: 45px 40px; border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .brand-title { font-size: 2rem; font-weight: 800; color: var(--primary-blue); margin-bottom: 8px; }
        .brand-title span { color: var(--accent-orange); }
        .subtitle { color: var(--text-muted); font-size: 1rem; font-weight: 600; margin-bottom: 35px; text-transform: uppercase; }

        #loginErrorMessage {
            background-color: #fee2e2; color: #dc2626; border: 2px solid #fecaca;
            padding: 12px 16px; border-radius: 12px; font-size: 0.9rem;
            margin-bottom: 24px; display: none; text-align: left;
        }

        .form-group { margin-bottom: 24px; text-align: left; }
        .form-control { width: 100%; padding: 14px 16px; border: 2px solid #e2e8f0; border-radius: 12px; box-sizing: border-box; }
        .btn-submit { background: var(--accent-orange); color: white; border: none; width: 100%; padding: 16px; cursor: pointer; border-radius: 12px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="auth-card">
        <div class="brand-title">Comfort<span>Xpress</span></div>
        <div class="subtitle">Enterprise Control Panel</div>
        <div id="loginErrorMessage"></div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Operator Security ID</label>
                <input type="text" id="username" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Secure Passphrase</label>
                <input type="password" id="securePassphraseField" class="form-control" required>
            </div>
            <button type="submit" class="btn-submit">Authorize Session</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear old sessions before trying to login
            localStorage.clear();
            
            const errorMessageEl = document.getElementById('loginErrorMessage');
            const username = document.getElementById('username').value;
            const passphrase = document.getElementById('securePassphraseField').value;
            
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, passphrase })
                });

                const data = await res.json();

                if (res.ok) {
                    // Set the EXACT token your other pages are checking for
                    localStorage.setItem('cx_session', 'authenticated_token');
                    window.location.replace('dashboard.html');
                } else {
                    throw new Error(data.message || 'Invalid security clearance.');
                }
            } catch (err) {
                errorMessageEl.innerText = err.message;
                errorMessageEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
